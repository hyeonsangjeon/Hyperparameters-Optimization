name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Verify generated notebooks
        run: python tools/build_notebooks.py --check

      - name: Execute tutorial end to end
        env:
          HPO_MODE: smoke
          HPO_N_JOBS: "1"
          MPLBACKEND: Agg
        run: >-
          jupyter nbconvert
          --to notebook
          --execute HyperParameterInspect.ipynb
          --output /tmp/HyperParameterInspect.executed.ipynb
          --ExecutePreprocessor.timeout=600
